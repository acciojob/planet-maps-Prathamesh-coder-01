<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planet Maps</title>
</head>
<body>

    <!-- Solar System Image -->
    <img src="solarsystem.jpg" usemap="#solar-map" alt="Solar System">

    <!-- Image Map -->
    <map name="solar-map">

        <!-- Sun -->
        <area shape="rect" coords="0,50,120,250" href="sun.htm" alt="Sun">

        <!-- Mercury -->
        <area shape="circle" coords="160,150,10" href="mercury.htm" alt="Mercury">

        <!-- Venus -->
        <area shape="circle" coords="220,150,15" href="venus.htm" alt="Venus">

        <!-- Earth -->
        <area shape="circle" coords="290,150,15" href="earth.htm" alt="Earth">

        <!-- Mars -->
        <area shape="circle" coords="360,150,12" href="mars.htm" alt="Mars">

        <!-- Jupiter -->
        <area shape="circle" coords="470,150,30" href="jupiter.htm" alt="Jupiter">

        <!-- Saturn -->
        <area shape="circle" coords="620,150,28" href="saturn.htm" alt="Saturn">

        <!-- Uranus -->
        <area shape="circle" coords="760,150,22" href="uranus.htm" alt="Uranus">

        <!-- Neptune -->
        <area shape="circle" coords="880,150,22" href="neptune.htm" alt="Neptune">

        <!-- Pluto -->
        <area shape="circle" coords="980,150,8" href="pluto.htm" alt="Pluto">

        <!-- Eris -->
        <area shape="circle" coords="1040,150,8" href="eris.htm" alt="Eris">

        <!-- Ceres -->
        <area shape="circle" coords="1080,150,8" href="ceres.htm" alt="Ceres">

    </map>

</body>
</html>
